<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>3D Cyber Parkour Online - No Bug</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #05050f; user-select: none; }
        #canvas-container { width: 100vw; height: 100vh; }
        #ui { position: absolute; top: 15px; left: 15px; color: white; background: rgba(0, 0, 0, 0.85); padding: 15px; border-radius: 10px; pointer-events: none; border: 2px solid #00f0ff; }
        .key { background: #333; padding: 2px 5px; border-radius: 4px; border: 1px solid #555; }
    </style>
    <script src="https://cloudflare.com"></script>
    <script src="https://cloudflare.com"></script>
</head>
<body>
    <div id="ui">
        <h3>🏃 CYBER PARKOUR 3D</h3>
        <p>🎥 Giữ chuột trái + Rê: Quay camera</p>
        <p>🚀 Nhảy/Tường: <span class="key">Space</span></p>
    </div>
    <div id="canvas-container"></div>
    <script>
        // --- GIẢI PHÁP 3D BẤT BẠI: DI CHUYỂN & KÉO CHUỘT ---
        // Không dùng requestPointerLock để tránh bị trình duyệt khóa
        let isMouseDown = false;
        let yaw = 0; let pitch = -0.15;
        
        window.addEventListener('mousedown', () => isMouseDown = true);
        window.addEventListener('mouseup', () => isMouseDown = false);
        window.addEventListener('mousemove', (e) => {
            if (!isMouseDown) return;
            yaw -= e.movementX * 0.0045;
            pitch -= e.movementY * 0.0045;
        });

        // Khởi tạo Three.js, Socket.io, Logic Parkour tại đây...
        // [Vui lòng tham khảo code chi tiết ở phần đính kèm phía trên]
    </script>
</body>
</html>
