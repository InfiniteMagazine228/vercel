<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>2D Mario Parkour Online</title>
    <style>
        body { margin: 0; overflow: hidden; background: #5c94fc; font-family: 'Segoe UI', sans-serif; color: white; user-select: none; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #fps-display { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.7); padding: 12px 15px; border-radius: 8px; border: 2px solid #00ff88; pointer-events: none; box-shadow: 0 0 10px rgba(0,255,136,0.3); font-size: 14px; }
        #ui { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 8px; border: 2px solid #fff; pointer-events: none; max-width: 250px; box-shadow: 0 0 10px rgba(255,255,255,0.2); }
        #leaderboard { position: absolute; bottom: 15px; left: 15px; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 8px; border: 2px solid #ffd700; min-width: 160px; pointer-events: none; }
        .key { background: #333; padding: 2px 5px; border-radius: 3px; font-weight: bold; color: #ffd700; }
        h3, h2 { margin: 0 0 8px 0; color: #ffd700; }
    </style>
    <script src="https://cloudflare.com"></script>
</head>
<body>

    <div id="fps-display">
        <b>FPS: <span id="fps-value" style="color:#00ff88;">60</span></b><br>
        🏁 Điểm bục: <span id="my-score" style="color:#ffd700; font-weight:bold;">0</span>
    </div>

    <div id="ui">
        <h2>🍄 HƯỚNG DẪN</h2>
        <p>🕹️ Chạy: <span class="key">A</span> (Trái) | <span class="key">D</span> (Phải)</p>
        <p>🚀 Nhảy cao: <span class="key">Space</span> hoặc <span class="key">W</span></p>
    </div>

    <div id="leaderboard">
        <h3>🏆 ĐUA TOP</h3>
        <div id="player-list"></div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const socket = io({ path: '/socket.io/', transports: ['polling'] });
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        let px = 100, py = 300;
        let vx = 0, vy = 0;
        let pWidth = 30, pHeight = 40;
        let isGrounded = false;
        let myScore = 0;
        let cameraX = 0;

        let otherPlayers = {};
        let keys = { a: false, d: false, space: false, w: false };

        let lastFpsUpdate = 0;
        let frameCount = 0;
        let fps = 60;

        window.addEventListener('keydown', (e) => handleKey(e, true));
        window.addEventListener('keyup', (e) => handleKey(e, false));

        function handleKey(e, isDown) {
            if (e.code === 'KeyA' || e.code === 'ArrowLeft') keys.a = isDown;
            if (e.code === 'KeyD' || e.code === 'ArrowRight') keys.d = isDown;
            if (e.code === 'Space') keys.space = isDown;
            if (e.code === 'KeyW') keys.w = isDown;
        }

        let platforms = [
            { x: 0,    y: 500, w: 400,  h: 100, col: '#b84418' }, 
            { x: 500,  y: 420, w: 120,  h: 30,  col: '#fcb444' }, 
            { x: 700,  y: 340, w: 120,  h: 30,  col: '#fcb444' }, 
            { x: 900,  y: 260, w: 150,  h: 30,  col: '#b84418' }, 
            { x: 1150, y: 350, w: 100,  h: 200, col: '#00a800' }, 
            { x: 1350, y: 430, w: 200,  h: 30,  col: '#fcb444' },
            { x: 1650, y: 500, w: 500,  h: 100, col: '#b84418' }  
        ];

        socket.on('currentPlayers', (players) => {
            Object.keys(players).forEach((id) => {
                if (id !== socket.id) otherPlayers[id] = players[id];
            });
            updateLeaderboard(players);
        });
        socket.on('newPlayer', (info) => { otherPlayers[info.id] = info; });
        socket.on('playerMoved', (info) => { if (otherPlayers[info.id]) otherPlayers[info.id] = info; });
        socket.on('playerDisconnected', (id) => { delete otherPlayers[id]; });
        socket.on('scoreUpdated', (players) => { updateLeaderboard(players); });

        function updateLeaderboard(players) {
            const list = document.getElementById('player-list');
            list.innerHTML = '';
            Object.keys(players).forEach(id => {
                const name = id === socket.id ? "Bạn 😎" : `User_${id.substring(0,4)}`;
                list.innerHTML += `<p style="margin:4px 0;">${name}: <b style="color:#00ff88">${players[id].score || 0}</b></p>`;
            });
        }

        function loop(timestamp) {
            frameCount++;
            if (timestamp - lastFpsUpdate >= 1000) {
                fps = Math.round((frameCount * 1000) / (timestamp - lastFpsUpdate));
                document.getElementById('fps-value').innerText = fps;
                frameCount = 0;
                lastFpsUpdate = timestamp;
            }

            if (keys.a) vx = -5;
            else if (keys.d) vx = 5;
            else vx *= 0.8;

            vy += 0.5; 

            px += vx;
            py += vy;

            isGrounded = false;
            let currentPlatformIdx = 0;

            platforms.forEach((plat, idx) => {
                if (px + pWidth > plat.x && px < plat.x + plat.w) {
                    if (py + pHeight <= plat.y && py + pHeight + vy >= plat.y) {
                        py = plat.y - pHeight;
                        vy = 0;
                        isGrounded = true;
                        currentPlatformIdx = idx;
                    }
                }
            });

            if ((keys.space || keys.w) && isGrounded) {
                vy = -12;
                isGrounded = false;
            }

            if (isGrounded && currentPlatformIdx > myScore) {
                myScore = currentPlatformIdx;
                document.getElementById('my-score').innerText = myScore;
                socket.emit('updateScore', myScore);
            }

            if (py > canvas.height + 100) {
                px = 100;
                py = 300;
                vx = 0;
                vy = 0;
            }

            cameraX = px - canvas.width / 4;
            if (cameraX < 0) cameraX = 0;

            socket.emit('playerMovement', { x: px, y: py, z: 0 });

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.translate(-cameraX, 0);

            ctx.fillStyle = '#f8d870';
            ctx.beginPath();
            ctx.arc(200, 100, 40, 0, Math.PI * 2);
            ctx.fill();

            platforms.forEach(plat => {
                ctx.fillStyle = plat.col;
                ctx.fillRect(plat.x, plat.y, plat.w, plat.w > 50 && plat.h > 50 ? canvas.height - plat.y : plat.h);
                
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 2;
                ctx.strokeRect(plat.x, plat.y, plat.w, plat.w > 50 && plat.h > 50 ? canvas.height - plat.y : plat.h);
            });

            Object.keys(otherPlayers).forEach(id => {
                let p = otherPlayers[id];
                ctx.fillStyle = '#e45c10';
                ctx.fillRect(p.x, p.y, pWidth, pHeight);
                ctx.strokeStyle = '#000';
                ctx.strokeRect(p.x, p.y, pWidth, pHeight);
            });

            ctx.fillStyle = '#fc9838';
            ctx.fillRect(px, py, pWidth, pHeight);
            ctx.strokeStyle = '#000';
            ctx.strokeRect(px, py, pWidth, pHeight);

            ctx.fillStyle = '#b84418';
            ctx.fillRect(px + 5, py, pWidth - 10, 12);

            ctx.restore();

            requestAnimationFrame(loop);
        }

        requestAnimationFrame((timestamp) => {
            lastFpsUpdate = timestamp;
            loop(timestamp);
        });
    </script>
</body>
</html>
