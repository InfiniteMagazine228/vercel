<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>3D Pure Engine Parkour Online - Final Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050510; font-family: 'Segoe UI', sans-serif; color: white; user-select: none; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #ui { position: absolute; top: 15px; left: 15px; background: rgba(5,5,16,0.85); padding: 15px; border-radius: 8px; border: 2px solid #00f0ff; pointer-events: none; box-shadow: 0 0 10px rgba(0,240,255,0.3); }
        #leaderboard { position: absolute; top: 15px; right: 15px; background: rgba(5,5,16,0.85); padding: 15px; border-radius: 8px; border: 2px solid #ff007f; min-width: 180px; pointer-events: none; box-shadow: 0 0 10px rgba(255,0,127,0.3); }
        .key { background: #333; padding: 2px 6px; border-radius: 3px; font-weight: bold; color: #00f0ff; }
        h3 { margin: 0 0 8px 0; border-bottom: 1px solid #333; padding-bottom: 4px; }
    </style>
    <script src="https://cloudflare.com"></script>
</head>
<body>

    <div id="ui">
        <h3 style="color:#00f0ff;">🏃 CYBER PARKOUR 3D</h3>
        <p>🕹️ Chạy: <span class="key">W</span> <span class="key">A</span> <span class="key">S</span> <span class="key">D</span></p>
        <p>🎥 Camera: <b>Giữ chuột trái + Kéo rê để xoay nhìn</b></p>
        <p>🚀 Nhảy / Chạy tường: <span class="key">Space</span></p>
        <p>⚡ Trượt (Slide): Giữ <span class="key">Shift trái</span></p>
        <p>📈 Điểm của bạn: <span id="my-score" style="color:#00ff88; font-weight:bold;">0</span> bục</p>
        <p>🌐 Trạng thái: <span id="state-text" style="color:#ffcc00;">Đang đứng</span></p>
    </div>

    <div id="leaderboard">
        <h3 style="color:#ff007f;">🏆 PHÒNG ONLINE</h3>
        <div id="player-list"></div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const socket = io({ path: '/socket.io/', transports: ['polling'] });
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        let px = 0, py = 2, pz = 5; 
        let vx = 0, vy = 0, vz = 0; 
        let yaw = 0, pitch = -0.2;  
        let isGrounded = false;
        let isWallRunning = false;
        let isSliding = false;
        let myScore = 0;

        let otherPlayers = {};

        let keys = { w: false, a: false, s: false, d: false, space: false, shift: false };
        let isMouseDown = false;
        let previousMousePosition = { x: 0, y: 0 };

        window.addEventListener('mousedown', (e) => {
            isMouseDown = true;
            previousMousePosition = { x: e.clientX, y: e.clientY };
        });
        window.addEventListener('mouseup', () => isMouseDown = false);
        window.addEventListener('mousemove', (e) => {
            if (!isMouseDown) return;
            const deltaX = e.clientX - previousMousePosition.x;
            const deltaY = e.clientY - previousMousePosition.y;

            yaw -= deltaX * 0.005;   
            pitch -= deltaY * 0.004; 
            pitch = Math.max(-0.6, Math.min(0.6, pitch)); 

            previousMousePosition = { x: e.clientX, y: e.clientY };
        });

        window.addEventListener('keydown', (e) => handleKey(e, true));
        window.addEventListener('keyup', (e) => handleKey(e, false));

        function handleKey(e, isDown) {
            if(e.code === 'KeyW') keys.w = isDown;
            if(e.code === 'KeyS') keys.s = isDown;
            if(e.code === 'KeyA') keys.a = isDown;
            if(e.code === 'KeyD') keys.d = isDown;
            if(e.code === 'Space') keys.space = isDown;
            if(e.code === 'ShiftLeft') keys.shift = isDown;
        }

        let platforms = [
            { x: 0,  y: 0,   z: 0,   w: 12, h: 1, d: 12, type: 'normal', col: '#151525' }, 
            { x: 0,  y: 1.5, z: -14, w: 4,  h: 1, d: 4,  type: 'normal', col: '#00f0ff' }, 
            { x: 6,  y: 3.5, z: -24, w: 4,  h: 1, d: 4,  type: 'normal', col: '#00f0ff' }, 
            { x: -6, y: 5.5, z: -36, w: 1,  h: 5, d: 12, type: 'wall',   col: '#ff007f' }, 
            { x: 0,  y: 4.5, z: -50, w: 6,  h: 1, d: 6,  type: 'normal', col: '#00f0ff' }, 
            { x: 0,  y: 4.7, z: -50, w: 2,  h: 0.4, d: 2, type: 'bounce', col: '#ffff00' }, 
            { x: 0,  y: 10,  z: -68, w: 4,  h: 1, d: 4,  type: 'moving', col: '#9900ff', startX: 0, range: 6, speed: 0.06, dir: 1 }, 
            { x: 0,  y: 9,   z: -88, w: 10, h: 1, d: 10, type: 'normal', col: '#00ff88' }  
        ];

        function project(x, y, z) {
            let dx = x - px;
            let dy = y - (py + (isSliding ? 1.5 : 2.2)); 
            let dz = z - pz;

            let rx = dx * Math.cos(yaw) - dz * Math.sin(yaw);
            let rz = dx * Math.sin(yaw) + dz * Math.cos(yaw);
            let ry = dy * Math.cos(pitch) - rz * Math.sin(pitch);
            let fz = dy * Math.sin(pitch) + rz * Math.cos(pitch);

            if (fz <= 0.1) return null;

            const fov = 450; 
            return { x: canvas.width / 2 + (rx * fov) / fz, y: canvas.height / 2 + (ry * fov) / fz, scale: fov / fz, depth: fz };
        }

        function drawCube(x, y, z, w, h, d, color) {
            let hw = w/2, hh = h/2, hd = d/2;
            let vertices = [
                {x: x - hw, y: y + hh, z: z - hd}, 
                {x: x + hw, y: y + hh, z: z - hd}, 
                {x: x + hw, y: y - hh, z: z - hd}, 
                {x: x - hw, y: y - hh, z: z - hd}, 
                {x: x - hw, y: y + hh, z: z + hd}, 
                {x: x + hw, y: y + hh, z: z + hd}, 
                {x: x + hw, y: y - hh, z: z + hd}, 
                {x: x - hw, y: y - hh, z: z + hd}  
            ];

            let pts = vertices.map(v => project(v.x, v.y, v.z));
            
            let faces = [
                [0, 1, 2, 3], 
                [1, 5, 6, 2], 
                [5, 4, 7, 6], 
                [4, 0, 3, 7], 
                [4, 5, 1, 0], 
                [3, 2, 6, 7]  
            ];

            faces.forEach(f => {
                if (!pts[f[0]] || !pts[f[1]] || !pts[f[2]] || !pts[f[3]]) return;
                
                ctx.beginPath();
                ctx.moveTo(pts[f[0]].x, pts[f[0]].y);
                ctx.lineTo(pts[f[1]].x, pts[f[1]].y);
                ctx.lineTo(pts[f[2]].x, pts[f[2]].y);
                ctx.lineTo(pts[f[3]].x, pts[f[3]].y);
                ctx.closePath();

                ctx.fillStyle = color;
                ctx.fill();
                ctx.strokeStyle = 'rgba(255,255,255,0.2)'; 
                ctx.stroke();
            });
        }

        socket.on('currentPlayers', (players) => {
            Object.keys(players).forEach((id) => {
                if (id !== socket.id) otherPlayers[id] = players[id];
            });
            updateLeaderboard(players);
        });
        socket.on('newPlayer', (info) => { otherPlayers[info.id] = info; });
        socket.on('playerMoved', (info) => { if (otherPlayers[info.id]) otherPlayers[info.id] = info; });
        socket.on('playerDisconnected', (id) => { delete otherPlayers[id]; });
        socket.on('scoreUpdated', (players) => { updateLeaderboard(players); });

        function updateLeaderboard(players) {
            const list = document.getElementById('player-list');
            list.innerHTML = '';
            Object.keys(players).forEach(id => {
                const name = id === socket.id ? "Bạn 😎" : `User_${id.substring(0,4)}`;
                list.innerHTML += `<p style="margin:4px 0;">${name}: <b style="color:#00ff88">${players[id].score || 0} bục</b></p>`;
            });
        }

        function loop() {
            let moveX = 0, moveZ = 0;
            if (keys.w) moveZ -= 1; if (keys.s) moveZ += 1;
            if (keys.a) moveX -= 1; if (keys.d) moveX += 1;

            let currentSpeed = 0.08;
            let stateText = "Đang đứng";

            if (keys.shift && isGrounded && (keys.w || keys.a || keys.s || keys.d)) {
                isSliding = true;
                currentSpeed = 0.15;
                stateText = "🔥 Đang trượt (Slide)";
            } else {
                isSliding = false;
            }

            let fx = moveX * Math.cos(yaw) - moveZ * Math.sin(yaw);
            let fz = moveX * Math.sin(yaw) + moveZ * Math.cos(yaw);
            let mag = Math.sqrt(fx*fx + fz*fz);
            if(mag > 0) { 
                if(stateText === "Đang đứng") stateText = "🏃 Đang chạy bộ";
                vx = (fx / mag) * currentSpeed; vz = (fz / mag) * currentSpeed; 
            } else { 
                vx *= 0.8; vz *= 0.8; 
            }

            if (!isWallRunning) vy -= 0.0055;
            else { vy = -0.008; stateText = "🧱 Đang chạy tường"; }

            px += vx; py += vy; pz += vz;

            platforms.forEach(plat => {
                if (plat.type === 'moving') {
                    plat.x += plat.speed * plat.dir;
                    if (Math.abs(plat.x - plat.startX) > plat.range) plat.dir *= -1;
                }
            });

            isGrounded = false;
            let hitPlatformIdx = -1;

            platforms.forEach((plat, idx) => {
                let hw = plat.w/2, hd = plat.d/2, hh = plat.h/2;
                if (px >= plat.x - hw && px <= plat.x + hw && pz >= plat.z - hd && pz <= plat.z + hd) {
                    let topY = plat.y + hh;
                    if (py <= topY && py >= topY + vy - 0.25) {
                        py = topY; vy = 0; isGrounded = true; hitPlatformIdx = idx;
                        if (plat.type === 'bounce') { vy = 0.165; isGrounded = false; } 
                        if (plat.type === 'moving') px += plat.speed * plat.dir; 
                    }
                }
});if (isGrounded && hitPlatformIdx > myScore) {myScore = hitPlatformIdx;document.getElementById('my-score').innerText = myScore;socket.emit('updateScore', myScore);}if (!isGrounded && keys.w) {let onWall = false;platforms.forEach(plat => {if (plat.type === 'wall') {if (py >= plat.y - plat.h/2 && py <= plat.y + plat.h/2) {if (Math.abs(px - plat.x) <= plat.w/2 + 0.6 && pz >= plat.z - plat.d/2 && pz <= plat.z + plat.d/2) onWall = true;}}});isWallRunning = onWall;} else { isWallRunning = false; }if (keys.space) {if (isGrounded) { vy = 0.115; isGrounded = false; }else if (isWallRunning) { vy = 0.125; px += Math.sin(yaw) * 0.2; isWallRunning = false; }}if(!isGrounded && !isWallRunning) stateText = "✈️ Đang trên không";document.getElementById('state-text').innerText = stateText;if (py < -15) { px = 0; py = 2; pz = 5; vx = 0; vy = 0; vz = 0; }socket.emit('playerMovement', { x: px, y: py, z: pz });ctx.clearRect(0, 0, canvas.width, canvas.height);let renderQueue = [];platforms.forEach(plat => {renderQueue.push({ zIndex: plat.z, draw: () => drawCube(plat.x, plat.y, plat.z, plat.w, plat.h, plat.d, plat.col) });});Object.keys(otherPlayers).forEach(id => {let p = otherPlayers[id];renderQueue.push({ zIndex: p.z, draw: () => drawCube(p.x, p.y, p.z, 1, 2, 1, '#ff0055') });});renderQueue.push({ zIndex: pz, draw: () => drawCube(px, py, pz, 1, 2, 1, '#00f0ff') });renderQueue.sort((a, b) => a.zIndex - b.zIndex).forEach(item => item.draw());requestAnimationFrame(loop);}loop();
