<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Mini Parkour - Siêu Mượt Không Lỗi</title>
    <style>
        body { margin: 0; overflow: hidden; background: #05050a; font-family: sans-serif; color: white; user-select: none; }
        #canvas { display: block; width: 100vw; height: 100vh; }
        #ui { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 8px; border: 2px solid #00f0ff; pointer-events: none; }
        .key { background: #333; padding: 2px 5px; border-radius: 3px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="ui">
        <h2 style="margin:0 0 10px 0; color:#00f0ff;">🏃 3D PARKOUR MINI</h2>
        <p>🕹️ Di chuyển: <span class="key">W</span> <span class="key">A</span> <span class="key">S</span> <span class="key">D</span></p>
        <p>🎥 Xoay nhìn: <b>Giữ chuột trái và Kéo rê chuột</b></p>
        <p>🚀 Nhảy cao: <span class="key">Space</span></p>
        <p>🏆 Điểm bục: <span id="score" style="color:#00ff88; font-weight:bold;">0</span></p>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // Khớp kích thước màn hình
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Biến điều khiển người chơi
        let px = 0, py = 2, pz = 5; // Vị trí người chơi
        let vx = 0, vy = 0, vz = 0; // Vận tốc
        let yaw = 0, pitch = -0.2;  // Góc nhìn camera
        let isGrounded = false;
        let score = 0;

        let keys = { w: false, a: false, s: false, d: false, space: false };
        let isMouseDown = false;
        let lastMouse = { x: 0, y: 0 };

        // Bắt sự kiện chuột (Kéo giữ để xoay)
        window.addEventListener('mousedown', (e) => { isMouseDown = true; lastMouse = { x: e.clientX, y: e.clientY }; });
        window.addEventListener('mouseup', () => isMouseDown = false);
        window.addEventListener('mousemove', (e) => {
            if (!isMouseDown) return;
            let dx = e.clientX - lastMouse.x;
            let dy = e.clientY - lastMouse.y;
            yaw -= dx * 0.007;
            pitch -= dy * 0.005;
            pitch = Math.max(-0.8, Math.min(0.8, pitch));
            lastMouse = { x: e.clientX, y: e.clientY };
        });

        // Bắt sự kiện bàn phím
        window.addEventListener('keydown', (e) => {
            if(e.code==='KeyW') keys.w=true; if(e.code==='KeyS') keys.s=true;
            if(e.code==='KeyA') keys.a=true; if(e.code==='KeyD') keys.d=true;
            if(e.code==='Space') keys.space=true;
        });
        window.addEventListener('keyup', (e) => {
            if(e.code==='KeyW') keys.w=false; if(e.code==='KeyS') keys.s=false;
            if(e.code==='KeyA') keys.a=false; if(e.code==='KeyD') keys.d=false;
            if(e.code==='Space') keys.space=false;
        });

        // Định nghĩa các khối bục 3D (X, Y, Z, Rộng, Cao, Sâu, Màu sắc)
        let platforms = [
            {x: 0,  y: 0, z: 0,   w: 6, h: 1, d: 6,  col: '#111122'}, // Sàn xuất phát
            {x: 0,  y: 1, z: -10, w: 3, h: 1, d: 3,  col: '#00f0ff'}, // Bục 1
            {x: 4,  y: 2, z: -18, w: 3, h: 1, d: 3,  col: '#ff007f'}, // Bục 2
            {x: -3, y: 3, z: -26, w: 3, h: 1, d: 3,  col: '#ffff00'}, // Bục 3
            {x: 0,  y: 4, z: -35, w: 5, h: 1, d: 5,  col: '#00ff88'}  // Đích
        ];

        // Hàm chiếu tọa độ 3D thành 2D trên màn hình phẳng
        function project(x, y, z) {
            // Chuyển đổi hệ tọa độ tương đối theo Camera vị trí người chơi
            let dx = x - px;
            let dy = y - (py + 0.5); // Chiều cao mắt nhìn
            let dz = z - pz;

            // Xoay theo trục Yaw (Trái / Phải)
            let rx = dx * Math.cos(yaw) - dz * Math.sin(yaw);
            let rz = dx * Math.sin(yaw) + dz * Math.cos(yaw);
            
            // Xoay theo trục Pitch (Lên / Xuống)
            let ry = dy * Math.cos(pitch) - rz * Math.sin(pitch);
            let fz = dy * Math.sin(pitch) + rz * Math.cos(pitch);

            if (fz <= 0.1) return null; // Vật thể ở phía sau lưng camera

            // Thuật toán thấu kính tiêu cự phối cảnh 3D
            const fov = 400; 
            let cx = canvas.width / 2 + (rx * fov) / fz;
            let cy = canvas.height / 2 + (ry * fov) / fz;
            return { x: cx, y: cy, scale: fov / fz };
        }

        // Hàm vẽ một khối hộp 3D thủ công bằng Canvas 2D
        function drawCube(p) {
            let vertices = [
                {x: p.x - p.w/2, y: p.y + p.h/2, z: p.z - p.d/2},
                {x: p.x + p.w/2, y: p.y + p.h/2, z: p.z - p.d/2},
                {x: p.x + p.w/2, y: p.y - p.h/2, z: p.z - p.d/2},
                {x: p.x - p.w/2, y: p.y - p.h/2, z: p.z - p.d/2},
                {x: p.x - p.w/2, y: p.y + p.h/2, z: p.z + p.d/2},
                {x: p.x + p.w/2, y: p.y + p.h/2, z: p.z + p.d/2},
                {x: p.x + p.w/2, y: p.y - p.h/2, z: p.z + p.d/2},
                {x: p.x - p.w/2, y: p.y - p.h/2, z: p.z + p.d/2}
            ];

            let pts = vertices.map(v => project(v.x, v.y, v.z));
            
            // Định nghĩa các mặt của hình hộp (mỗi mặt gồm 4 đỉnh nối vào nhau)
            let faces = [
                [0, 1, 2, 3], [4, 5, 6, 7], [0, 1, 5, 4], [2, 3, 7, 6], [0, 3, 7, 4], [1, 2, 6, 5]
            ];

            faces.forEach(f => {
                if (!pts[f[0]] || !pts[f[1]] || !pts[f[2]] || !pts[f[3]]) return;
                
                ctx.beginPath();
                ctx.moveTo(pts[f[0]].x, pts[f[0]].y);
                ctx.lineTo(pts[f[1]].x, pts[f[1]].y);
                ctx.lineTo(pts[f[2]].x, pts[f[2]].y);
                ctx.lineTo(pts[f[3]].x, pts[f[3]].y);
                ctx.closePath();

                ctx.fillStyle = p.col;
                ctx.fill();
                ctx.strokeStyle = 'rgba(255,255,255,0.2)';
                ctx.stroke();
            });
        }

        // VÒNG LẶP GAME LOOP CHÍNH
        function loop() {
            // 1. Tính toán hướng di chuyển vật lý
            let moveX = 0, moveZ = 0;
            if (keys.w) moveZ -= 1; if (keys.s) moveZ += 1;
            if (keys.a) moveX -= 1; if (keys.d) moveX += 1;

            let speed = 0.08;
            let fx = moveX * Math.cos(yaw) - moveZ * Math.sin(yaw);
            let fz = moveX * Math.sin(yaw) + moveZ * Math.cos(yaw);
            
            let mag = Math.sqrt(fx*fx + fz*fz);
            if(mag > 0) { fx /= mag; fz /= mag; vx = fx * speed; vz = fz * speed; } 
            else { vx *= 0.8; vz *= 0.8; }

            // Áp dụng trọng lực rơi tự do
            vy -= 0.005;
            
            px += vx; py += vy; pz += vz;

            // 2. Xử lý va chạm đứng vững trên bục
            isGrounded = false;
            platforms.forEach((plat, idx) => {
                if (px >= plat.x - plat.w/2 && px <= plat.x + plat.w/2 &&
                    pz >= plat.z - plat.d/2 && pz <= plat.z + plat.d/2) {
                    
                    let topY = plat.y + plat.h/2;
                    if (py <= topY && py >= topY + vy - 0.2) {
                        py = topY;
                        vy = 0;
                        isGrounded = true;
                        if(idx > score) { score = idx; document.getElementById('score').innerText = score; }
                    }
                }
            });

            // Lệnh nhảy khi dẫm đất
            if (keys.space && isGrounded) { vy = 0.12; isGrounded = false; }

            // Rơi xuống vực sâu rớt mạng -> Hồi sinh tại chỗ xuất phát
            if (py < -10) { px = 0; py = 2; pz = 5; vy = 0; }

            // 3. Xóa màn hình cũ và Vẽ khung cảnh mới
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Vẽ các bục chướng ngại vật từ xa tới gần (Sắp xếp theo chiều sâu trục Z để không bị đè lỗi)
            platforms.sort((a,b) => b.z - a.z).forEach(drawCube);

            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>
</html>
